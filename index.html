<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Sites</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.container {
  max-width: 800px;
  width: 100%;
}
h1 {
  color: #fff;
  text-align: center;
  font-size: 32px;
  margin-bottom: 40px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  text-decoration: none;
  transition: all 0.3s ease;
}
.card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.2);
}
.card-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.card-title {
  color: #fff;
  font-size: 18px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
  <h1>Promo Sites</h1>
  <div class="grid">
    <a href="superex/" class="card">
      <div class="card-icon">🔐</div>
      <div class="card-title">SuperEX</div>
    </a>
    <a href="okx/" class="card">
      <div class="card-icon">💚</div>
      <div class="card-title">OKX</div>
    </a>
    <a href="kuif/" class="card">
      <div class="card-icon">💳</div>
      <div class="card-title">KUIF</div>
    </a>
    <a href="nexo/" class="card">
      <div class="card-icon">💰</div>
      <div class="card-title">Nexo</div>
    </a>
    <a href="airbnb/" class="card">
      <div class="card-icon">🏠</div>
      <div class="card-title">Airbnb</div>
    </a>
    <a href="hostinger/" class="card">
      <div class="card-icon">🌐</div>
      <div class="card-title">Hostinger</div>
    </a>
    <a href="wise/" class="card">
      <div class="card-icon">💸</div>
      <div class="card-title">Wise</div>
    </a>
    <a href="rr88/" class="card">
      <div class="card-icon">🎰</div>
      <div class="card-title">RR88</div>
    </a>
  </div>
</div>
</body>
</html>
